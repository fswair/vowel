# Fixtures example
# Fixtures are injected as keyword-only arguments to functions.
# Declare them with `fixture: [name]` on the function spec.
# Provide actual setup/teardown via .with_fixtures() in Python.

# The function signature must be:
#   def write_and_count(content: str, *, tmp: str) -> int:
# where `tmp` is a keyword-only arg matching the fixture name.

write_and_count:
  fixture:
    - tmp
  dataset:
    - case:
        id: write_count_hello_world
        input: "Hello World"
        expected: 11
    - case:
        id: write_count_test
        input: "Test"
        expected: 4

count_users:
  fixture:
    - db
  dataset:
    - case:
        id: count_users_alice
        input: "Alice"
        expected: 2
    - case:
        id: count_users_bob
        input: "Bob"
        expected: 2

add_with_bonus:
  fixture:
    - config
  dataset:
    - case:
        id: add_with_bonus_basic
        inputs: { a: 1, b: 2 }
        expected: 13
